<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem Conexão — LabHub</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0f172a; color: #e2e8f0;
      padding: 24px;
    }
    .card {
      text-align: center; max-width: 360px;
      padding: 40px 32px; border-radius: 20px;
      background: #1e293b; border: 1px solid #334155;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .icon { width: 48px; height: 48px; margin: 0 auto 20px; display: block; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 12px; border: none;
      background: #059669; color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background .2s;
    }
    .btn:hover { background: #047857; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .footer { margin-top: 24px; font-size: 11px; color: #475569; }
    .spinner { width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading .label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <h1>Sem conexão</h1>
    <p>Você está offline. Os dados salvos localmente serão sincronizados quando a conexão for restabelecida.</p>
    <button class="btn" id="retryBtn" onclick="location.reload()">
      <span class="label">Tentar novamente</span>
      <span class="spinner"></span>
    </button>
    <p class="footer">LabHub · Hub de aplicações para laboratórios</p>
  </div>
</body>
</html>
